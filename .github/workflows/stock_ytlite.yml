name: Build Stock YTLite

on:
  workflow_dispatch:
    inputs:
      ipa_url:
        description: "URL to the decrypted IPA file"
        required: true
        type: string
      bundle_id:
        description: "Bundle ID"
        default: "i.am.kain.ytag"
        required: true
        type: string
      app_name:
        description: "App Name"
        default: "YouTube Afterglow"
        required: true
        type: string

concurrency:
  group: stock-build
  cancel-in-progress: true

jobs:
  build:
    name: Build Stock YTLite
    runs-on: macos-latest
    permissions:
      contents: write
    env:
      HAS_SIGNING: ${{ secrets.P12_BASE64 != '' }}

    steps:
      - name: Download IPA
        run: |
          wget "${{ github.event.inputs.ipa_url }}" --quiet --no-verbose --no-check-certificate -O youtube.ipa

      - name: Download YTLite deb
        run: |
          YTLITE_VERSION="5.2b4"
          echo "YTLITE_VERSION=$YTLITE_VERSION" >> $GITHUB_ENV
          curl -sL "https://github.com/dayanch96/YTLite/releases/download/v${YTLITE_VERSION}/com.dvntm.ytlite_${YTLITE_VERSION}_iphoneos-arm64.deb" -o ytlite.deb

      - name: Install cyan
        run: pipx install --force https://github.com/asdfzxcvbn/pyzule-rw/archive/main.zip

      - name: Inject and package
        run: |
          cyan -i youtube.ipa -o stock_ytlite.ipa -uwef ytlite.deb \
            -n "${{ github.event.inputs.app_name }}" \
            -b "${{ github.event.inputs.bundle_id }}"

      - name: Upload unsigned
        uses: actions/upload-artifact@v4
        with:
          name: stock_ytlite_unsigned
          path: stock_ytlite.ipa

      - name: Sign IPA
        if: ${{ env.HAS_SIGNING == 'true' }}
        env:
          P12_BASE64: ${{ secrets.P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          MOBILEPROVISION_BASE64: ${{ secrets.MOBILEPROVISION_BASE64 }}
        run: |
          set -euo pipefail
          printf '%s' "$P12_BASE64" | base64 --decode > cert.p12
          printf '%s' "$MOBILEPROVISION_BASE64" | base64 --decode > profile.mobileprovision

          KEYCHAIN="build.keychain"
          security create-keychain -p "actions" "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"
          security unlock-keychain -p "actions" "$KEYCHAIN"
          security set-keychain-settings -t 3600 "$KEYCHAIN"
          security import cert.p12 -k "$KEYCHAIN" -P "$P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "actions" "$KEYCHAIN"

          SIGNING_IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN" | head -1 | grep -o '".*"' | tr -d '"')

          mkdir -p ipa_contents
          unzip -q stock_ytlite.ipa -d ipa_contents
          APP_DIR=$(find ipa_contents/Payload -maxdepth 1 -name "*.app" -type d | head -1)

          cp profile.mobileprovision "$APP_DIR/embedded.mobileprovision"
          security cms -D -i profile.mobileprovision > profile_full.plist
          /usr/libexec/PlistBuddy -x -c "Print :Entitlements" profile_full.plist > entitlements.plist

          find "$APP_DIR" -name "*.framework" -type d | while read item; do
            codesign --force --sign "$SIGNING_IDENTITY" --timestamp=none "$item" || true
          done
          find "$APP_DIR" -name "*.dylib" -type f | while read item; do
            codesign --force --sign "$SIGNING_IDENTITY" --timestamp=none "$item" || true
          done
          codesign --force --sign "$SIGNING_IDENTITY" --timestamp=none --entitlements entitlements.plist "$APP_DIR"

          cd ipa_contents
          zip -qr ../stock_ytlite_signed.ipa Payload
          cd ..

      - name: Generate OTA manifest
        if: ${{ env.HAS_SIGNING == 'true' }}
        run: |
          IPA_URL="https://github.com/${{ github.repository }}/releases/download/stock-${{ env.YTLITE_VERSION }}/stock_ytlite_signed.ipa"
          cat > manifest.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>items</key>
              <array>
                  <dict>
                      <key>assets</key>
                      <array>
                          <dict>
                              <key>kind</key>
                              <string>software-package</string>
                              <key>url</key>
                              <string>${IPA_URL}</string>
                          </dict>
                      </array>
                      <key>metadata</key>
                      <dict>
                          <key>bundle-identifier</key>
                          <string>${{ github.event.inputs.bundle_id }}</string>
                          <key>bundle-version</key>
                          <string>1.0</string>
                          <key>kind</key>
                          <string>software</string>
                          <key>title</key>
                          <string>${{ github.event.inputs.app_name }}</string>
                      </dict>
                  </dict>
              </array>
          </dict>
          </plist>
          PLIST

      - name: Create Release
        if: ${{ env.HAS_SIGNING == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: stock-${{ env.YTLITE_VERSION }}
          name: Stock YTLite ${{ env.YTLITE_VERSION }}
          files: |
            stock_ytlite_signed.ipa
            stock_ytlite.ipa
            manifest.plist

      - name: OTA Link
        if: ${{ env.HAS_SIGNING == 'true' }}
        run: |
          OTA="itms-services://?action=download-manifest&url=https://github.com/${{ github.repository }}/releases/download/stock-${{ env.YTLITE_VERSION }}/manifest.plist"
          echo "::notice::OTA Install: $OTA"
          echo "## OTA Install" >> $GITHUB_STEP_SUMMARY
          echo "[Install Stock YTLite]($OTA)" >> $GITHUB_STEP_SUMMARY
