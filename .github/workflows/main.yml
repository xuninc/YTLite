name: Create YouTube Plus app

on:
  workflow_dispatch:
    inputs:
      enable_youpip:
        description: "Integrate YouPiP"
        type: boolean
        required: true
        default: false

      enable_ytuhd:
        description: "Integrate YTUHD"
        type: boolean
        required: true
        default: false

      enable_yq:
        description: "Integrate YouQuality"
        type: boolean
        required: true
        default: false

      enable_ryd:
        description: "Integrate Return YouTube Dislikes"
        type: boolean
        required: true
        default: false

      enable_ytabc:
        description: "Integrate YTABConfig"
        type: boolean
        required: true
        default: false

      enable_demc:
        description: "Integrate DontEatMyContent"
        type: boolean
        required: true
        default: false

      ipa_url:
        description: "URL to the decrypted IPA file"
        default: ""
        required: true
        type: string

      tweak_version:
        description: "The version of the tweak to use. Enter the version manually from dayanch96/YTLite/releases or leave default"
        default: "5.2b4"
        required: true
        type: string

      display_name:
        description: "App Name (Optional)"
        default: "YouTube"
        required: true
        type: string

      bundle_id:
        description: "BundleID (Optional)"
        default: "com.google.ios.youtube"
        required: true
        type: string

      info_note:
        description: "TIP: Learn more about integrations in the README via the link below"
        default: "https://github.com/dayanch96/YTLite#tweak-integration-details"
        type: string
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-tweaks:
    uses: ./.github/workflows/_build_tweaks.yml
    with:
      enable_youpip: ${{ inputs.enable_youpip }}
      enable_ytuhd: ${{ inputs.enable_ytuhd }}
      enable_yq: ${{ inputs.enable_yq }}
      enable_ryd: ${{ inputs.enable_ryd }}
      enable_ytabc: ${{ inputs.enable_ytabc }}
      enable_demc: ${{ inputs.enable_demc }}
      tweak_version: ${{ inputs.tweak_version }}

  package:
    name: Package IPA
    runs-on: macos-latest
    needs: build-tweaks
    permissions:
      contents: write
    env:
      HAS_SIGNING: ${{ secrets.P12_BASE64 != '' }}

    steps:
      - name: Download built debs
        uses: actions/download-artifact@v7
        with:
          name: built-debs
          path: ${{ github.workspace }}

      - name: Hide sensitive inputs
        uses: levibostian/action-hide-sensitive-inputs@v1
        with:
          exclude_inputs: bundle_id,display_name,enable_demc,enable_ryd,enable_ytabc,enable_youpip,enable_yq,enable_ytuhd,info_note,tweak_version

      - name: Download and validate IPA
        run: |
          wget "${{ github.event.inputs.ipa_url }}" --no-verbose --no-check-certificate -O youtube.ipa
          file_type=$(file --mime-type -b youtube.ipa)
          if [[ "$file_type" != "application/x-ios-app" && "$file_type" != "application/zip" ]]; then
            echo "::error::Validation failed: The downloaded file is not a valid IPA. Detected type: $file_type."
            exit 1
          fi

      - name: Install cyan
        run: pipx install --force https://github.com/asdfzxcvbn/pyzule-rw/archive/main.zip


      - name: Inject tweaks into IPA
        run: |
          tweaks="ytplus.deb OpenYoutubeSafariExtension.appex"
          for f in *.deb; do
            [ -f "$f" ] && tweaks="$tweaks $f"
          done
          cyan -i youtube.ipa -o YouTubePlus_${{ github.event.inputs.tweak_version }}.ipa -uwef $tweaks -n "${{ github.event.inputs.display_name }}" -b ${{ github.event.inputs.bundle_id }}

      - name: Sign IPA
        if: ${{ env.HAS_SIGNING == 'true' }}
        env:
          P12_BASE64: ${{ secrets.P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          MOBILEPROVISION_BASE64: ${{ secrets.MOBILEPROVISION_BASE64 }}
        run: |
          set -euo pipefail
          printf '%s' "$P12_BASE64" | base64 --decode > cert.p12
          printf '%s' "$MOBILEPROVISION_BASE64" | base64 --decode > profile.mobileprovision
          KEYCHAIN="build.keychain"
          security create-keychain -p "actions" "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"
          security unlock-keychain -p "actions" "$KEYCHAIN"
          security set-keychain-settings -t 3600 "$KEYCHAIN"
          security import cert.p12 -k "$KEYCHAIN" -P "$P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "actions" "$KEYCHAIN"
          SIGNING_IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN" | head -1 | grep -o '".*"' | tr -d '"')
          IPA="YouTubePlus_${{ github.event.inputs.tweak_version }}.ipa"
          mkdir -p ipa_contents
          unzip -q "$IPA" -d ipa_contents
          APP_DIR=$(find ipa_contents/Payload -maxdepth 1 -name "*.app" -type d | head -1)
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier ${{ github.event.inputs.bundle_id }}" "$APP_DIR/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName ${{ github.event.inputs.display_name }}" "$APP_DIR/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleName ${{ github.event.inputs.display_name }}" "$APP_DIR/Info.plist"
          cp profile.mobileprovision "$APP_DIR/embedded.mobileprovision"
          security cms -D -i profile.mobileprovision > profile_full.plist
          /usr/libexec/PlistBuddy -x -c "Print :Entitlements" profile_full.plist > entitlements.plist
          find "$APP_DIR" -name "*.framework" -type d | while read item; do codesign --force --sign "$SIGNING_IDENTITY" --timestamp=none "$item" || true; done
          find "$APP_DIR" -name "*.dylib" -type f | while read item; do codesign --force --sign "$SIGNING_IDENTITY" --timestamp=none "$item" || true; done
          codesign --force --sign "$SIGNING_IDENTITY" --timestamp=none --entitlements entitlements.plist "$APP_DIR"
          cd ipa_contents && zip -qr "../YouTubePlus_signed.ipa" Payload && cd ..
          rm -rf ipa_contents cert.p12 profile.mobileprovision profile_full.plist entitlements.plist

      - name: Generate OTA manifest
        if: ${{ env.HAS_SIGNING == 'true' }}
        run: |
          IPA_URL="https://github.com/${{ github.repository }}/releases/download/ytp-${{ github.run_number }}/YouTubePlus_signed.ipa"
          BUNDLE_ID="${{ github.event.inputs.bundle_id }}"
          DISPLAY_NAME="${{ github.event.inputs.display_name }}"
          cat > manifest.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>items</key>
              <array>
                  <dict>
                      <key>assets</key>
                      <array>
                          <dict>
                              <key>kind</key>
                              <string>software-package</string>
                              <key>url</key>
                              <string>${IPA_URL}</string>
                          </dict>
                      </array>
                      <key>metadata</key>
                      <dict>
                          <key>bundle-identifier</key>
                          <string>${BUNDLE_ID}</string>
                          <key>bundle-version</key>
                          <string>1.0</string>
                          <key>kind</key>
                          <string>software</string>
                          <key>title</key>
                          <string>${DISPLAY_NAME}</string>
                      </dict>
                  </dict>
              </array>
          </dict>
          </plist>
          PLIST

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2.5.0
        with:
          tag_name: ytp-${{ github.run_number }}
          name: YouTubePlus v${{ github.event.inputs.tweak_version }} (${{ github.run_number }})
          files: |
            YouTubePlus_${{ github.event.inputs.tweak_version }}.ipa
            YouTubePlus_signed.ipa
            manifest.plist

      - name: OTA Install Link
        if: ${{ env.HAS_SIGNING == 'true' }}
        run: |
          OTA="itms-services://?action=download-manifest&url=https://github.com/${{ github.repository }}/releases/download/ytp-${{ github.run_number }}/manifest.plist"
          echo "::notice::OTA Install: $OTA"
          echo "## OTA Install" >> $GITHUB_STEP_SUMMARY
          echo "[Install YouTube Plus]($OTA)" >> $GITHUB_STEP_SUMMARY
